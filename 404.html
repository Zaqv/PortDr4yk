<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr4yk Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #00ff88;
            font-family: 'Press Start 2P', cursive;
            min-height: 100vh;
            display: none;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .glitch {
            font-size: clamp(0.8rem, 3vw, 1.1rem);
            text-shadow: 0 0 20px rgba(0,255,136,0.8), 0 0 40px rgba(0,255,136,0.4);
            margin-bottom: 2.5rem;
            line-height: 2.2;
            animation: flicker 3s infinite;
        }
        .sub {
            font-size: clamp(0.38rem, 1.5vw, 0.5rem);
            color: #00cc66;
            line-height: 2.5;
            margin-bottom: 2rem;
        }
        #countdown {
            font-size: clamp(0.5rem, 2vw, 0.7rem);
            text-shadow: 0 0 10px rgba(0,255,136,0.6);
        }
        .bar-wrap {
            margin-top: 1.5rem;
            width: 100%;
            height: 4px;
            background: rgba(0,255,136,0.15);
            border-radius: 2px;
            overflow: hidden;
        }
        .bar {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00cc66);
            box-shadow: 0 0 10px rgba(0,255,136,0.6);
            animation: drain 3s linear forwards;
        }
        @keyframes drain { from { width: 100%; } to { width: 0%; } }
        @keyframes flicker {
            0%, 95%, 100% { opacity: 1; }
            96% { opacity: 0.4; }
            97% { opacity: 1; }
            98% { opacity: 0.2; }
            99% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div>
        <p class="glitch">VC NÃO DEVERIA<br>ESTAR AQUI &gt;:(&nbsp;</p>
        <p class="sub">te redirecionando para a pagina principal em</p>
        <p id="countdown">3 segundos...</p>
        <div class="bar-wrap"><div class="bar"></div></div>
    </div>
    <script>
        var l = window.location;
        var base = l.pathname.split('/').slice(0, 2).join('/');
        var navEntry = performance.getEntriesByType('navigation')[0];
        var navType = navEntry ? navEntry.type : (performance.navigation ? (performance.navigation.type === 1 ? 'reload' : 'navigate') : 'navigate');

        if (navType === 'reload' || navType === 'back_forward') {
            l.replace(l.origin + base + '/?r=' + encodeURIComponent(l.pathname + l.search) + l.hash);
        } else {
            document.body.style.display = 'flex';
            var n = 3;
            var el = document.getElementById('countdown');
            var iv = setInterval(function() {
                n--;
                el.textContent = n + ' segundo' + (n === 1 ? '...' : 's...');
                if (n <= 0) { clearInterval(iv); l.replace(l.origin + base + '/'); }
            }, 1000);
        }
    </script>
</body>
</html>
